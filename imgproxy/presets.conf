# imgproxy presets — one per UI placement (see api/ElBaul.Infra/ImgproxyUrlBuilder.cs,
# which maps ImagePlacement values to these names). IMGPROXY_ONLY_PRESETS=true makes
# this file the sole allowlist of servable sizes: a leaked signing key can only ever
# request one of these, not an arbitrary render.
photo-grid-thumbnail=resizing_type:fill/width:400/height:400/gravity:sm
photo-full=resizing_type:fit/width:1600/height:1600
album-cover=resizing_type:fill/width:500/height:500/gravity:sm
album-cover-featured=resizing_type:fill/width:800/height:500/gravity:sm
removal-request-thumbnail=resizing_type:fill/width:480/height:360/gravity:sm
invitation-preview=resizing_type:fill/width:640/height:400/gravity:sm
