# Local development environment: Postgres + MinIO + imgproxy + fake-oidc + both
# services, each built from its own Dockerfile.
#
# imgproxy is the only thing that ever reads from MinIO — it holds its own S3
# credentials and fetches originals directly (s3://bucket/key). The API never hands
# out a MinIO URL; it only builds signed imgproxy URLs (see
# api/ElBaul.Infra/ImgproxyUrlBuilder.cs and imgproxy/presets.conf for the allowed
# resize presets).
#
# The frontend's Dockerfile runs `npm run build` itself, in a build stage, baking in
# the VITE_* build args below — nginx then just serves the resulting `dist/`. No
# manual `npm run build` needed before `docker compose up --build` anymore.
#
# fake-oidc (https://github.com/ne2-studio/fake-oidc) is a throwaway OIDC provider for
# local/E2E use — no real login UI, users are selected via `login_hint`. Sign in with
# `login_hint=admin` or `login_hint=user` against http://localhost:5000/authorize.

# Pinned explicitly (rather than left to default to the checkout directory's basename)
# so image tags stay predictable — CI builds these images in one job and loads them by
# name (el-baul-api, el-baul-app, el-baul-imgproxy) in later jobs.
name: el-baul

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: elbaul
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d elbaul"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  imgproxy:
    build:
      context: ./imgproxy
      dockerfile: Dockerfile
    environment:
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: "http://minio:9000"
      IMGPROXY_S3_ENDPOINT_USE_PATH_STYLE: "true"
      IMGPROXY_S3_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      IMGPROXY_KEY: "de60801120d03c14c8f17cfc7f8e77c4ee21712606163c1ef4c8ea45a80173a4"
      IMGPROXY_SALT: "bbf343c1d3a7def2db1faa30c446fe815e2b87add292ab65c30ce8e774bcc96c"
    ports:
      - "8081:8080"
    depends_on:
      minio:
        condition: service_healthy

  fake-oidc:
    image: ghcr.io/ne2-studio/fake-oidc:latest
    environment:
      OIDC_ISSUER: "http://localhost:5000"
      OIDC_CLIENTS: >-
        [{"clientId":"el-baul-app","redirectUris":["http://localhost:3000/callback"]},
        {"clientId":"el-baul-admin","redirectUris":["http://localhost:3001/callback"]}]
      OIDC_USERS: >-
        [{"key":"admin","sub":"admin-user","email":"admin@test.local","name":"Admin User","roles":["admin"]},
        {"key":"user","sub":"normal-user","email":"user@test.local","name":"Normal User","roles":["user"]}]
      OIDC_DEFAULT_USER: "admin"
    ports:
      - "5000:5000"
    healthcheck:
      # No curl/wget in this image (minimal Ubuntu + .NET runtime) — bash's /dev/tcp is a
      # TCP-connect-only check, but confirmed sufficient: the gap between "container
      # started" and "Kestrel accepting connections" is real (~0.5s, observed directly)
      # but is specifically a connection-refused window, not a slower app-level delay.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5000"]
      interval: 2s
      timeout: 2s
      retries: 15

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=elbaul;Username=devuser;Password=devpass"
      Auth__JwksUri: "http://fake-oidc:5000/.well-known/jwks.json"
      Auth__ValidIssuer: "http://localhost:5000"
      Auth__Audience: "el-baul-app"
      # el-baul-admin (the backoffice SPA) is a separate Zitadel client id, so its tokens
      # carry a different "aud" than the consumer app's — both need to validate.
      Auth__ValidAudiences__0: "el-baul-app"
      Auth__ValidAudiences__1: "el-baul-admin"
      Auth__UserInfoEndpoint: "http://fake-oidc:5000/oidc/v1/userinfo"
      Storage__Endpoint: "http://minio:9000"
      Storage__AccessKey: "minioadmin"
      Storage__SecretKey: "minioadmin"
      Storage__BucketName: "el-baul-photos"
      Imgproxy__BaseUrl: "http://localhost:8081"
      Imgproxy__Key: "de60801120d03c14c8f17cfc7f8e77c4ee21712606163c1ef4c8ea45a80173a4"
      Imgproxy__Salt: "bbf343c1d3a7def2db1faa30c446fe815e2b87add292ab65c30ce8e774bcc96c"
      # Backoffice dashboard quick-links — blank locally, filled in on the real deployment.
      ExternalTools__Metabase: ""
      ExternalTools__Sentry: ""
      ExternalTools__Hangfire: ""
      ExternalTools__Seq: ""
      ExternalTools__Beszel: ""
      ExternalTools__MinioConsole: "http://localhost:9001"
    ports:
      - "5050:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      imgproxy:
        condition: service_started
      fake-oidc:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5050"
        VITE_OIDC_AUTHORITY: "http://localhost:5000"
        VITE_OIDC_CLIENT_ID: "el-baul-app"
        VITE_OIDC_CALLBACK_URI: "http://localhost:3000/callback"
    ports:
      - "3000:80"
    depends_on:
      - api

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:5050"
        VITE_OIDC_AUTHORITY: "http://localhost:5000"
        VITE_OIDC_CLIENT_ID: "el-baul-admin"
        VITE_OIDC_CALLBACK_URI: "http://localhost:3001/callback"
        VITE_APP_URL: "http://localhost:3000"
    ports:
      - "3001:80"
    depends_on:
      - api

  # Static Storybook site for app/'s component library. Unlike the other services,
  # its build context is the repo root - see storybook/Dockerfile for why.
  storybook:
    build:
      context: .
      dockerfile: storybook/Dockerfile
    ports:
      - "6006:80"

volumes:
  pgdata:
  miniodata:
