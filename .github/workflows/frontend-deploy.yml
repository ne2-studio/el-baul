name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/frontend-deploy.yml'
      - 'app/**'
      - 'docker-compose.lite.yml'
      # Everything el-baul-api-lite is built from (see api/ElBaul.Api.Lite/Dockerfile) — this
      # pipeline builds and runs that image as part of its acceptance test, so a change to any
      # of these can break it just as much as a change under app/ can.
      - 'api/ElBaul/**'
      - 'api/ElBaul.Api.Common/**'
      - 'api/ElBaul.Api.Lite/**'
      - 'api/ElBaul.Infra.Common/**'
      - 'api/ElBaul.Infra.Lite/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-app

defaults:
  run:
    working-directory: app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # No --build-arg VITE_* here on purpose: this image reads its VITE_* config at container
      # start instead (see app/src/runtimeConfig.ts + app/docker-entrypoint.d/), configured as
      # Coolify's runtime Environment Variables on the frontend service — not build args, not
      # GitHub Actions repo/environment vars. docker-compose.yaml's `app` service configures
      # the same thing the same way for local dev.
      - name: Build image
        run: docker build -t $IMAGE_NAME:latest .

      # Everything below, up to Push image, verifies the image just built above — same
      # artifact, redirected at a throwaway backend via the runtime env-config mechanism
      # (see app/src/runtimeConfig.ts), never rebuilt. Mirrors backend-deploy.yml's own
      # build → docker-image-tests → push ordering: a failure here blocks the push/deploy.

      - name: Build backend lite image
        working-directory: api
        run: docker build -f ElBaul.Api.Lite/Dockerfile -t el-baul-api-lite:ci .

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright browsers (+ OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (browsers already cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run frontend image acceptance tests (against el-baul-api-lite)
        env:
          APP_IMAGE: ${{ env.IMAGE_NAME }}:latest
          API_LITE_IMAGE: el-baul-api-lite:ci
        run: npm run test:image-acceptance

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-image-acceptance
          path: app/playwright-report-image-acceptance/
          retention-days: 7

      - name: Push image
        run: docker push $IMAGE_NAME:latest

      - name: Trigger Coolify deploy
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_FRONTEND }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      - name: Extract dist from the built image
        run: |
          docker create --name extract $IMAGE_NAME:latest
          docker cp extract:/usr/share/nginx/html ./dist
          docker rm extract

      - name: Upload sourcemaps to Sentry
        run: npm run sentry:upload-sourcemaps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
