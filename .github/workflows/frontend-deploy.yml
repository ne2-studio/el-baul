name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/frontend-deploy.yml'
      - 'app/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-app

defaults:
  run:
    working-directory: app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_API_URL="${{ vars.VITE_API_URL }}" \
            --build-arg VITE_OIDC_AUTHORITY="${{ vars.VITE_OIDC_AUTHORITY }}" \
            --build-arg VITE_OIDC_CLIENT_ID="${{ vars.VITE_OIDC_CLIENT_ID }}" \
            --build-arg VITE_OIDC_CALLBACK_URI="${{ vars.VITE_OIDC_CALLBACK_URI }}" \
            --build-arg VITE_ZITADEL_ORGANIZATION_ID="${{ vars.VITE_ZITADEL_ORGANIZATION_ID }}" \
            --build-arg VITE_SENTRY_DSN="${{ vars.VITE_SENTRY_DSN }}" \
            -t $IMAGE_NAME:latest .

      # Everything below, up to Push image, verifies the image just built above — same
      # artifact, redirected at a throwaway backend via the runtime env-config mechanism
      # (see app/src/runtimeConfig.ts), never rebuilt. Mirrors backend-deploy.yml's own
      # build → docker-image-tests → push ordering: a failure here blocks the push/deploy.

      - name: Build backend lite image
        working-directory: api
        run: docker build -f ElBaul.Api.Lite/Dockerfile -t el-baul-api-lite:ci .

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('app/package-lock.json') }}

      - name: Install Playwright browsers (+ OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (browsers already cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run frontend image acceptance tests (against el-baul-api-lite)
        env:
          APP_IMAGE: ${{ env.IMAGE_NAME }}:latest
          API_LITE_IMAGE: el-baul-api-lite:ci
        run: npm run test:image-acceptance

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-image-acceptance
          path: app/playwright-report-image-acceptance/
          retention-days: 7

      - name: Push image
        run: docker push $IMAGE_NAME:latest

      - name: Trigger Coolify deploy
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_FRONTEND }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"

      - name: Extract dist from the built image
        run: |
          docker create --name extract $IMAGE_NAME:latest
          docker cp extract:/usr/share/nginx/html ./dist
          docker rm extract

      - name: Upload sourcemaps to Sentry
        run: npm run sentry:upload-sourcemaps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
