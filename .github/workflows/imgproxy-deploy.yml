name: Imgproxy CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/imgproxy-deploy.yml'
      - 'imgproxy/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-imgproxy

defaults:
  run:
    working-directory: imgproxy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Push image
        run: docker push $IMAGE_NAME:latest

      - name: Trigger Coolify deploy
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_IMGPROXY }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
