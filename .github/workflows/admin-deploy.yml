name: Admin CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/admin-deploy.yml'
      - 'admin/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-admin

defaults:
  run:
    working-directory: admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # No --build-arg VITE_* here on purpose: this image reads its VITE_* config at container
      # start instead (see admin/src/runtimeConfig.ts + admin/docker-entrypoint.d/), configured
      # as Coolify's runtime Environment Variables on the admin service — not build args, not
      # GitHub Actions repo/environment vars. docker-compose.yaml's `admin` service configures
      # the same thing the same way for local dev.
      - name: Build image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Push image
        run: docker push $IMAGE_NAME:latest

      - name: Trigger Coolify deploy
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_ADMIN }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
