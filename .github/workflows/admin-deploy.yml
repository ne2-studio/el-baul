name: Admin CI/CD

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/admin-deploy.yml'
      - 'admin/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-admin

defaults:
  run:
    working-directory: admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_API_URL="${{ vars.VITE_API_URL }}" \
            --build-arg VITE_OIDC_AUTHORITY="${{ vars.VITE_OIDC_AUTHORITY }}" \
            --build-arg VITE_OIDC_CLIENT_ID="${{ vars.VITE_ADMIN_OIDC_CLIENT_ID }}" \
            --build-arg VITE_OIDC_CALLBACK_URI="${{ vars.VITE_ADMIN_OIDC_CALLBACK_URI }}" \
            --build-arg VITE_ZITADEL_ORGANIZATION_ID="${{ vars.VITE_ZITADEL_ORGANIZATION_ID }}" \
            --build-arg VITE_APP_URL="${{ vars.VITE_APP_URL }}" \
            -t $IMAGE_NAME:latest .

      - name: Push image
        run: docker push $IMAGE_NAME:latest

      - name: Trigger Coolify deploy
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_ADMIN }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
